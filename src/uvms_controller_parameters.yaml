uvms_controller:
  base_TF_translation:
    type: double_array
    description: "specifies transformation from vehicle base to manipulator base"
    read_only: true
    validation:
      not_empty<>: []
      fixed_size<>: [3]

  base_TF_rotation:
    type: double_array
    description: "specifies transformation from vehicle base to manipulator base"
    read_only: true
    validation:
      not_empty<>: []
      fixed_size<>: [3]

  thrusters:
    type: string_array
    description: "specifies which thrusters will be used by the controller."
    read_only: true
    validation:
      not_empty<>: []
      fixed_size<>: [8]
      unique<>: []

  joints:
    type: string_array
    description: "specifies which joints will be used by the controller."
    read_only: true
    validation:
      not_empty<>: []
      fixed_size<>: [6]
      unique<>: []

  __map_joints:
    dynamics_identifier:
      type: string
      description: "maps to the joints used in the dynamics calculation"
      read_only: true
      validation:
        not_empty<>: null
        one_of<>: [[floating_base, joint0, joint1, joint2, joint3, endeffector]]

    pose_topic_interface:
      type: string_array
      description: "subscribe_ position map parameter with struct name"
      read_only: true
      validation:
        not_empty<>: []
        unique<>: []
        size_lt<>: [8]

    velocity_topic_interface:
      type: string_array
      description: "subscribe_ velocity map parameter with struct name"
      read_only: true
      validation:
        not_empty<>: []
        unique<>: []
        size_lt<>: [7]

    pose_command_interface:
      type: string_array
      description: "publish_ position map parameter with struct name"
      read_only: true
      validation:
        not_empty<>: []
        unique<>: []
        size_lt<>: [8]

    velocity_command_interface:
      type: string_array
      description: "publish_ velocity map parameter with struct name"
      read_only: true
      validation:
        not_empty<>: []
        unique<>: []
        size_lt<>: [7]

    effort_command_interface:
      type: string_array
      description: "effort map parameter with struct name"
      read_only: true
      validation:
        not_empty<>: []
        unique<>: []
        size_lt<>: [9]