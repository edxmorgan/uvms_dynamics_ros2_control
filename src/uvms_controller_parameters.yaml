uvms_controller:
  joints: {
    type: string_array,
    default_value: [],
    description: "Name of the joints to control",
     read_only: true,
  }
  
  command_interface_name: {
    type: string,
    default_value: "",
    description: "Name of the interface used by the controller for writing commands to the hardware.",
    read_only: true,
  }

  state_interface_names: {
    type: string_array,
    default_value: [],
    description: "Name of the interfaces used by the controller getting hardware states",
    read_only: true,
  }
